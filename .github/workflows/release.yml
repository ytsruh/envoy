name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 1.24.4

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Generate templates
        run: templ generate ./server

      - name: Run Test suite
        run: go test ./... -race -cover

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 1.24.4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Generate templates
        run: templ generate ./server

      - name: Build server
        run: |
          CGO_ENABLED=0 GOOS=linux go build \
            -ldflags "-s -w -X ytsruh.com/envoy/shared.Version=${{ steps.version.outputs.VERSION }}" \
            -o envoy-server ./cmd/server.go

      - name: Install Railway
        run: bash <(curl -fsSL cli.new)

      - name: Deploy to Railway
        run: railway up -- --token ${{ secrets.RAILWAY_TOKEN }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Build CLI - macOS amd64
        run: |
          GOOS=darwin GOARCH=amd64 go build -tags=cli \
            -ldflags "-s -w -X ytsruh.com/envoy/shared.Version=${{ steps.version.outputs.VERSION }}" \
            -o envoy-cli-darwin-amd64 ./cmd/cli.go

      - name: Build CLI - macOS arm64
        run: |
          GOOS=darwin GOARCH=arm64 go build -tags=cli \
            -ldflags "-s -w -X ytsruh.com/envoy/shared.Version=${{ steps.version.outputs.VERSION }}" \
            -o envoy-cli-darwin-arm64 ./cmd/cli.go

      - name: Build CLI - Linux amd64
        run: |
          GOOS=linux GOARCH=amd64 go build -tags=cli \
            -ldflags "-s -w -X ytsruh.com/envoy/shared.Version=${{ steps.version.outputs.VERSION }}" \
            -o envoy-cli-linux-amd64 ./cmd/cli.go

      - name: Build CLI - Linux arm64
        run: |
          GOOS=linux GOARCH=arm64 go build -tags=cli \
            -ldflags "-s -w -X ytsruh.com/envoy/shared.Version=${{ steps.version.outputs.VERSION }}" \
            -o envoy-cli-linux-arm64 ./cmd/cli.go

      - name: Build CLI - Windows amd64
        run: |
          GOOS=windows GOARCH=amd64 go build -tags=cli \
            -ldflags "-s -w -X ytsruh.com/envoy/shared.Version=${{ steps.version.outputs.VERSION }}" \
            -o envoy-cli-windows-amd64.exe ./cmd/cli.go

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            envoy-cli-darwin-amd64
            envoy-cli-darwin-arm64
            envoy-cli-linux-amd64
            envoy-cli-linux-arm64
            envoy-cli-windows-amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
